<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #0f172a; }
    
    /* Input styling */
    .blank-input {
      border: none;
      border-bottom: 3px solid #94a3b8;
      background-color: #f1f5f9;
      outline: none;
      text-align: center;
      font-weight: 800;
      color: #4c1d95;
      padding: 4px 12px;
      margin: 0 6px;
      min-width: 140px;
      width: auto;
      border-radius: 6px 6px 0 0;

      border-bottom-color: #7c3aed;

    }
    .blank-input:disabled {
      background-color: transparent;
    }

</head>
<body class="min-h-screen flex flex-col">

  <!-- Smart Copyright & Contact Badge (Hover to expand) -->

    <!-- Collapsed Badge -->
    <div class="bg-orange-500 text-white font-bold text-sm sm:text-base px-4 py-2 rounded-full shadow-md cursor-help opacity-90 group-hover:opacity-100 transition-opacity flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
      © Ms. Hana
    </div>
    
    <!-- Expanded Info Box -->
    <div class="mt-2 w-72 sm:w-80 bg-white rounded-2xl shadow-2xl border border-slate-200 p-5 text-sm text-slate-600 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform scale-95 group-hover:scale-100 origin-top-right">
      <h3 class="font-black text-slate-800 text-base mb-2 border-b border-slate-100 pb-2">© Hana (Hyuna) Gu</h3>
      <ul class="space-y-2 mb-4 text-xs sm:text-sm">
        <li class="flex items-start gap-2">
          <span class="text-green-500 font-bold">✓</span>
          <span>Free for <b>student self-study</b> and practice.</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-red-500 font-bold">✗</span>
          <span><b>Classroom use by other educators</b> requires explicit permission.</span>
        </li>
      </ul>
      <div class="pt-3 border-t border-slate-100 text-xs sm:text-sm bg-slate-50 p-3 rounded-lg">
        <p class="font-bold text-slate-700 mb-1">Need more levels or topics?</p>
        <p>Contact for full access & licensing:<br>
          <a href="mailto:hanagu.teaching@gmail.com" class="text-blue-600 font-bold hover:underline break-all">hanagu.teaching@gmail.com</a>
        </p>
      </div>
    </div>
  </div>

  <div id="root" class="flex-grow flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- SVG Visual Aid Component (Geometry, Graphs, Models Only) ---
    const VisualAid = ({ type }) => {
      const renderGraphic = () => {
        switch(type) {
          // Graphs
          case 'bar_graph': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="10" y1="10" x2="10" y2="90" stroke="#334155" strokeWidth="4"/><line x1="10" y1="90" x2="90" y2="90" stroke="#334155" strokeWidth="4"/><rect x="20" y="50" width="15" height="40" fill="#ef4444"/><rect x="45" y="20" width="15" height="70" fill="#7c3aed"/><rect x="70" y="60" width="15" height="30" fill="#10b981"/></svg>;
          case 'pie_chart': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="40" fill="#7c3aed"/><path d="M 50 50 L 50 10 A 40 40 0 0 1 90 50 Z" fill="#ef4444"/><path d="M 50 50 L 90 50 A 40 40 0 0 1 20 76 Z" fill="#10b981"/></svg>;
          case 'line_graph': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="10" y1="10" x2="10" y2="90" stroke="#334155" strokeWidth="4"/><line x1="10" y1="90" x2="90" y2="90" stroke="#334155" strokeWidth="4"/><polyline points="20,80 40,40 60,60 80,20" fill="none" stroke="#ef4444" strokeWidth="4" strokeLinejoin="round"/><circle cx="20" cy="80" r="4" fill="#1e293b"/><circle cx="40" cy="40" r="4" fill="#1e293b"/><circle cx="60" cy="60" r="4" fill="#1e293b"/><circle cx="80" cy="20" r="4" fill="#1e293b"/></svg>;

          // Basic Lines & Points
          case 'point': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="8" fill="#ef4444"/></svg>;
          case 'line': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="15" y1="50" x2="85" y2="50" stroke="#4c1d95" strokeWidth="6"/><polygon points="85,44 97,50 85,56" fill="#4c1d95"/><polygon points="15,44 3,50 15,56" fill="#4c1d95"/></svg>;
          case 'line_segment': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="20" y1="50" x2="80" y2="50" stroke="#4c1d95" strokeWidth="6"/><circle cx="20" cy="50" r="5" fill="#ef4444"/><circle cx="80" cy="50" r="5" fill="#ef4444"/></svg>;
          case 'ray': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="20" y1="50" x2="85" y2="50" stroke="#4c1d95" strokeWidth="6"/><circle cx="20" cy="50" r="5" fill="#ef4444"/><polygon points="85,44 97,50 85,56" fill="#4c1d95"/></svg>;
          case 'intersecting': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="20" y1="20" x2="80" y2="80" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/><line x1="20" y1="80" x2="80" y2="20" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/></svg>;
          case 'parallel': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="10" y1="40" x2="90" y2="40" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/><line x1="10" y1="60" x2="90" y2="60" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/></svg>;
          case 'perpendicular': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="50" y1="10" x2="50" y2="90" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/><line x1="10" y1="50" x2="90" y2="50" stroke="#4c1d95" strokeWidth="6" strokeLinecap="round"/><polyline points="50,30 70,30 70,50" fill="none" stroke="#ef4444" strokeWidth="5" strokeLinejoin="round"/></svg>;
          case 'diagonal': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><rect x="20" y="30" width="60" height="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/><line x1="20" y1="30" x2="80" y2="70" stroke="#ef4444" strokeWidth="5" strokeDasharray="5,5"/></svg>;

          // Angles
          case 'acute_angle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M 90 80 L 20 80 L 60 20" fill="none" stroke="#4c1d95" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/><path d="M 50 80 A 30 30 0 0 0 40 50" fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round"/></svg>;
          case 'obtuse_angle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M 90 80 L 40 80 L 10 30" fill="none" stroke="#4c1d95" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/><path d="M 65 80 A 25 25 0 0 1 25 55" fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round"/></svg>;
          case 'right_angle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="20,80 80,80 20,20" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="5" strokeLinejoin="round" /><polyline points="20,55 45,55 45,80" fill="none" stroke="#ef4444" strokeWidth="5" strokeLinejoin="round"/></svg>;
          case 'straight_angle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="10" y1="50" x2="90" y2="50" stroke="#4c1d95" strokeWidth="5" strokeLinecap="round"/><circle cx="50" cy="50" r="4" fill="#ef4444"/><path d="M 30 50 A 20 20 0 0 1 70 50" fill="none" stroke="#ef4444" strokeWidth="4"/></svg>;
          case 'adjacent_angle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M 90 80 L 20 80 L 60 20" fill="none" stroke="#4c1d95" strokeWidth="4"/><path d="M 20 80 L 40 10" fill="none" stroke="#4c1d95" strokeWidth="4"/><path d="M 40 80 A 20 20 0 0 0 35 55" fill="none" stroke="#ef4444" strokeWidth="4"/><path d="M 50 80 A 30 30 0 0 0 45 35" fill="none" stroke="#10b981" strokeWidth="4"/></svg>;

          // Triangles
          case 'equilateral_triangle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="50,15 15,85 85,85" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/><line x1="30" y1="50" x2="35" y2="50" stroke="#ef4444" strokeWidth="4"/><line x1="65" y1="50" x2="70" y2="50" stroke="#ef4444" strokeWidth="4"/><line x1="50" y1="83" x2="50" y2="87" stroke="#ef4444" strokeWidth="4"/></svg>;
          case 'isosceles_triangle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="50,10 30,90 70,90" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/><line x1="38" y1="50" x2="42" y2="50" stroke="#ef4444" strokeWidth="4"/><line x1="58" y1="50" x2="62" y2="50" stroke="#ef4444" strokeWidth="4"/></svg>;
          case 'scalene_triangle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="20,80 90,80 40,20" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/></svg>;

          // Quadrilaterals
          case 'rectangle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><rect x="15" y="30" width="70" height="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/><polyline points="15,40 25,40 25,30" fill="none" stroke="#ef4444" strokeWidth="3"/></svg>;
          case 'square': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><rect x="25" y="25" width="50" height="50" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/><polyline points="25,35 35,35 35,25" fill="none" stroke="#ef4444" strokeWidth="3"/></svg>;
          case 'rhombus': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="50,10 85,50 50,90 15,50" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/></svg>;
          case 'parallelogram': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="30,25 90,25 70,75 10,75" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/></svg>;
          case 'trapezoid': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="30,30 70,30 90,80 10,80" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4" strokeLinejoin="round"/></svg>;

          // Circles & Parts
          case 'circle': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/></svg>;
          case 'radius': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/><line x1="50" y1="50" x2="90" y2="50" stroke="#ef4444" strokeWidth="6" strokeLinecap="round"/><circle cx="50" cy="50" r="5" fill="#ef4444"/></svg>;
          case 'diameter': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="4"/><line x1="10" y1="50" x2="90" y2="50" stroke="#ef4444" strokeWidth="6" strokeLinecap="round"/><circle cx="50" cy="50" r="4" fill="#4c1d95"/></svg>;
          case 'arc': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="50" r="40" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="2"/><path d="M 90 50 A 40 40 0 0 0 50 10" fill="none" stroke="#ef4444" strokeWidth="8"/></svg>;

          // Measurements & Coordinate Plane
          case 'perimeter': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><rect x="20" y="20" width="60" height="60" fill="none" stroke="#ef4444" strokeWidth="6"/><path d="M 25 15 L 75 15" stroke="#ef4444" strokeWidth="4" strokeDasharray="3 3"/></svg>;
          case 'area': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><rect x="20" y="20" width="60" height="60" fill="#fef08a" stroke="#4c1d95" strokeWidth="4"/></svg>;
          case 'coordinate_plane': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><line x1="50" y1="10" x2="50" y2="90" stroke="#4c1d95" strokeWidth="4"/><line x1="10" y1="50" x2="90" y2="50" stroke="#4c1d95" strokeWidth="4"/><polygon points="50,5 55,15 45,15" fill="#4c1d95"/><polygon points="95,50 85,45 85,55" fill="#4c1d95"/><circle cx="70" cy="30" r="5" fill="#ef4444"/></svg>;

          // 3D Shapes
          case 'cube': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M30 30 L70 30 L70 70 L30 70 Z" fill="#c4b5fd" stroke="#4c1d95" strokeWidth="3"/><path d="M30 30 L45 15 L85 15 L70 30" fill="#e9d5ff" stroke="#4c1d95" strokeWidth="3"/><path d="M70 70 L85 55 L85 15 L70 30" fill="#a78bfa" stroke="#4c1d95" strokeWidth="3"/></svg>;
          case 'cylinder': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M 20 25 L 20 75 A 30 12 0 0 0 80 75 L 80 25 Z" fill="#c4b5fd" stroke="#4c1d95" strokeWidth="3" strokeLinejoin="round"/><path d="M 20 75 A 30 12 0 0 1 80 75" fill="none" stroke="#4c1d95" strokeWidth="3" strokeDasharray="4 4" /><ellipse cx="50" cy="25" rx="30" ry="12" fill="#e9d5ff" stroke="#4c1d95" strokeWidth="3" /></svg>;
          case 'sphere': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-lg"><defs><radialGradient id="sphereGrad" cx="30%" cy="30%" r="70%"><stop offset="0%" stopColor="#e9d5ff"/><stop offset="100%" stopColor="#6d28d9"/></radialGradient></defs><circle cx="50" cy="50" r="40" fill="url(#sphereGrad)"/></svg>;
          case 'cone': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><path d="M20 75 L50 15 L80 75 Z" fill="#c4b5fd" stroke="#4c1d95" strokeWidth="3"/><ellipse cx="50" cy="75" rx="30" ry="10" fill="#e9d5ff" stroke="#4c1d95" strokeWidth="3"/></svg>;
          case 'prism': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="30,80 70,80 50,40" fill="#c4b5fd" stroke="#4c1d95" strokeWidth="3"/><polygon points="50,40 70,80 90,60 70,20" fill="#e9d5ff" stroke="#4c1d95" strokeWidth="3"/></svg>;
          case 'pyramid': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><polygon points="10,75 50,85 90,75 50,15" fill="#e9d5ff" stroke="#4c1d95" strokeWidth="3"/><line x1="50" y1="85" x2="50" y2="15" stroke="#4c1d95" strokeWidth="3"/></svg>;

          // Models & Tools
          case 'array': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md">{[20,40,60,80].map(x => [20,40,60,80].map(y => <circle key={`${x}${y}`} cx={x} cy={y} r="6" fill="#7c3aed" />))}</svg>;
          case 'number_bond': return <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md"><circle cx="50" cy="20" r="15" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="3"/><text x="50" y="25" textAnchor="middle" fontSize="12" fontWeight="bold">10</text><line x1="40" y1="32" x2="25" y2="58" stroke="#334155" strokeWidth="3"/><circle cx="20" cy="70" r="15" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="3"/><text x="20" y="75" textAnchor="middle" fontSize="12" fontWeight="bold">6</text><line x1="60" y1="32" x2="75" y2="58" stroke="#334155" strokeWidth="3"/><circle cx="80" cy="70" r="15" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="3"/><text x="80" y="75" textAnchor="middle" fontSize="12" fontWeight="bold">4</text></svg>;
          case 'tape_diagram': return <svg viewBox="0 0 100 40" className="w-48 h-20 mx-auto drop-shadow-md"><rect x="10" y="10" width="80" height="20" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="3"/><line x1="30" y1="10" x2="30" y2="30" stroke="#4c1d95" strokeWidth="3"/><line x1="50" y1="10" x2="50" y2="30" stroke="#4c1d95" strokeWidth="3"/><line x1="70" y1="10" x2="70" y2="30" stroke="#4c1d95" strokeWidth="3"/></svg>;
          case 'area_model': return <svg viewBox="0 0 100 80" className="w-32 h-24 mx-auto drop-shadow-md"><rect x="10" y="10" width="80" height="60" fill="#f3e8ff" stroke="#4c1d95" strokeWidth="3"/><line x1="60" y1="10" x2="60" y2="70" stroke="#4c1d95" strokeWidth="3"/><line x1="10" y1="30" x2="90" y2="30" stroke="#4c1d95" strokeWidth="3"/></svg>;
          case 'protractor': return <svg viewBox="0 0 100 60" className="w-40 h-24 mx-auto drop-shadow-md"><path d="M 10 50 A 40 40 0 0 1 90 50 Z" fill="#e2e8f0" stroke="#334155" strokeWidth="3"/><path d="M 25 50 A 25 25 0 0 1 75 50 Z" fill="none" stroke="#334155" strokeWidth="2"/><line x1="50" y1="50" x2="50" y2="10" stroke="#334155" strokeWidth="2"/><line x1="50" y1="50" x2="22" y2="22" stroke="#334155" strokeWidth="2"/><line x1="50" y1="50" x2="78" y2="22" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="50" r="3" fill="#1e293b"/><line x1="5" y1="50" x2="95" y2="50" stroke="#334155" strokeWidth="3"/></svg>;
          case 'ruler': return <svg viewBox="0 0 100 40" className="w-48 h-20 mx-auto drop-shadow-md"><rect x="10" y="10" width="80" height="20" fill="#fef08a" stroke="#ca8a04" strokeWidth="3"/>{[20,30,40,50,60,70,80].map(x=> <line key={x} x1={x} y1="10" x2={x} y2="15" stroke="#ca8a04" strokeWidth="2"/>)}</svg>;
          case 'compass': return <svg viewBox="0 0 100 100" className="w-24 h-32 mx-auto drop-shadow-md"><line x1="50" y1="20" x2="30" y2="80" stroke="#94a3b8" strokeWidth="6" strokeLinecap="round"/><line x1="50" y1="20" x2="70" y2="80" stroke="#94a3b8" strokeWidth="6" strokeLinecap="round"/><circle cx="50" cy="20" r="8" fill="#475569"/><rect x="28" y="80" width="4" height="10" fill="#1e293b"/><rect x="68" y="80" width="4" height="10" fill="#ef4444"/></svg>;
          
          default: return null;
        }
      };

      return <div className="my-6">{renderGraphic()}</div>;
    };

    // --- PURE GEOMETRY, GRAPHS & MODELS QUIZ DATA (NO OVERLAP WITH LIST 1) ---
    const rawQuizData = [
      // GRAPHS & DATA
      { id: 1, type: "visual_fill", visual: "bar_graph", text: "Mr. Davis asked his class about their favorite fruits and drew colorful columns to compare them. He made a ___ graph.", answer: "bar" },
      { id: 2, type: "visual_fill", visual: "pie_chart", text: "To show that half of his allowance goes to savings, Tom drew a circle and shaded half of it. This is a ___ chart.", answer: "pie" },
      { id: 3, type: "visual_fill", visual: "line_graph", text: "A news channel connected dots on a grid to show how the temperature went up and down over the week. It is a ___ graph.", answer: "line" },
      { id: 4, type: "fill", text: "Sarah scored 80, 90, and 100. To find her average, she added them up and divided by 3. She calculated the ___.", answer: "mean" },
      { id: 5, type: "fill", text: "If you line up five students from shortest to tallest, the height of the person standing exactly in the middle is the ___.", answer: "median" },
      { id: 6, type: "fill", text: "In a shoe store, size 7 is sold the most often. Because it appears most frequently in the data, size 7 is the ___.", answer: "mode" },
      { id: 7, type: "fill", text: "The oldest person in the room is 50 and the youngest is 10. The difference between their ages is 40, which is the ___.", answer: "range" },

      // GEOMETRY (Angles & Lines)
      { id: 8, type: "visual_fill", visual: "acute_angle", text: "The beak of a bird opens slightly, forming a sharp angle smaller than a square corner. It is an ___ angle.", answer: "acute" },
      { id: 9, type: "visual_fill", visual: "obtuse_angle", text: "A folding fan is opened very wide, past 90 degrees but not totally flat. It forms an ___ angle.", answer: "obtuse" },
      { id: 10, type: "visual_fill", visual: "right_angle", text: "The corner of your TV screen makes a perfect L-shape. It measures exactly 90 degrees, so it is a ___ angle.", answer: "right" },

    ];

    // Shuffle Helper
    const shuffle = (array) => {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    function App() {
      // Core States
      const [quizList, setQuizList] = useState([]);
      const [mistakesQueue, setMistakesQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [round, setRound] = useState(1);
      const [isDone, setIsDone] = useState(false);
      const topRef = useRef(null);

      // Current Batch States (5 questions per page)
      const BATCH_SIZE = 5;
      const [currentBatch, setCurrentBatch] = useState([]);
      const [currentWordBank, setCurrentWordBank] = useState([]);
      
      // User Interaction
      const [answers, setAnswers] = useState({});
      const [hasChecked, setHasChecked] = useState(false);

      // 1. Initialize Game
      useEffect(() => {
        setQuizList(shuffle(rawQuizData));
      }, []);

      // 2. Load Current Batch
      useEffect(() => {
        if (quizList.length === 0) return;
        
        const batch = quizList.slice(currentIndex, currentIndex + BATCH_SIZE);
        setCurrentBatch(batch);
        
        // Generate Word Bank only from "fill" and "visual_fill" questions
        const fillQuestions = batch.filter(q => q.type.includes('fill'));
        const words = fillQuestions.map(q => q.answer);
        const uniqueWords = [...new Set(words)].sort();
        setCurrentWordBank(uniqueWords);
        
        setAnswers({});
        setHasChecked(false);
      }, [quizList, currentIndex]);

      const handleInput = (id, value) => {
        if (hasChecked) return;
        setAnswers(prev => ({ ...prev, [id]: value }));
      };

      const handleCheck = () => {
        let currentMistakes = [];
        
        currentBatch.forEach(q => {
          const userAnswer = (answers[q.id] || "").trim().toLowerCase();
          const correctAnswer = q.answer.trim().toLowerCase();
          
          if (userAnswer !== correctAnswer) {
            currentMistakes.push(q);
          }
        });

        setMistakesQueue(prev => {
          const newQueue = [...prev];
          currentMistakes.forEach(mistake => {
            if (!newQueue.find(w => w.id === mistake.id)) newQueue.push(mistake);
          });
          return newQueue;
        });

        setHasChecked(true);
        if(topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' });
      };

      const handleNext = () => {
        const nextIndex = currentIndex + BATCH_SIZE;
        
        if (nextIndex < quizList.length) {
          setCurrentIndex(nextIndex);
          window.scrollTo(0, 0);
        } else {
          if (mistakesQueue.length > 0) {
            setQuizList(shuffle([...mistakesQueue]));
            setMistakesQueue([]);
            setCurrentIndex(0);
            setRound(prev => prev + 1);
            window.scrollTo(0, 0);
          } else {
            setIsDone(true);
          }
        }
      };

      const handleRestart = () => {
        setQuizList(shuffle(rawQuizData));
        setMistakesQueue([]);
        setCurrentIndex(0);
        setIsDone(false);
        setRound(1);
      };

      if (quizList.length === 0) return <div className="p-8 text-center font-bold text-xl">Building Quiz Environment...</div>;

      if (isDone) {
        return (
          <div className="flex flex-col items-center justify-center flex-grow bg-emerald-50 p-6">
            <div className="text-8xl mb-8 animate-bounce">📐</div>
            <h1 className="text-5xl sm:text-6xl font-extrabold text-emerald-800 mb-6 text-center drop-shadow-sm">Geometry Master!</h1>
            <p className="text-2xl text-emerald-700 mb-10 font-bold text-center">You successfully conquered all visual and text challenges.</p>
            <button 
              onClick={handleRestart}
              className="px-10 py-5 bg-purple-600 text-white rounded-2xl shadow-xl hover:bg-purple-700 transition font-black text-2xl"
            >
              Play Again!
            </button>
          </div>
        );
      }

      const totalBatches = Math.ceil(quizList.length / BATCH_SIZE);
      const currentBatchNum = Math.floor(currentIndex / BATCH_SIZE) + 1;

      return (
        <div className="max-w-4xl mx-auto p-4 sm:p-6 w-full" ref={topRef}>
          
          {/* Header & Progress */}
          <div className="text-center mb-8 bg-white p-6 rounded-3xl shadow-md border-b-4 border-purple-500">
            <h1 className="text-3xl sm:text-4xl font-black text-slate-800 mb-2">Geometry & Graphs Application</h1>
            <p className="text-purple-600 font-bold text-lg">
              {round > 1 
                ? <span className="text-red-600 bg-red-100 px-4 py-1 rounded-full animate-pulse">Review Round {round} : Fix your mistakes!</span>
                : "Analyze the pictures and sentences to find the correct mathematical terms."}
            </p>
            
            <div className="mt-6 flex items-center justify-center gap-3 text-sm font-extrabold text-slate-400 uppercase tracking-widest bg-slate-50 py-2 rounded-xl">
              <span className="text-purple-500">Page {currentBatchNum} of {totalBatches}</span>
              <span>•</span>
              <span>Questions {currentIndex + 1} - {Math.min(currentIndex + BATCH_SIZE, quizList.length)}</span>
              <span>•</span>
              <span className="text-emerald-500">Total {quizList.length}</span>
            </div>
            
            <div className="w-full bg-slate-200 h-3 mt-4 rounded-full overflow-hidden shadow-inner">
              <div 
                className={`h-full transition-all duration-500 ease-out ${round > 1 ? 'bg-red-500' : 'bg-purple-500'}`}
                style={{ width: `${((currentBatchNum) / totalBatches) * 100}%` }}
              ></div>
            </div>
          </div>

          {/* Dynamic Word Bank */}
          {currentWordBank.length > 0 && (
            <div className="bg-emerald-50 rounded-3xl shadow-md border-2 border-emerald-200 p-6 mb-10 text-center relative pt-8">
              <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white px-8 py-2 rounded-full font-black text-sm uppercase tracking-widest shadow-md">
                Spelling Helper Bank
              </div>
              <div className="flex flex-wrap justify-center gap-3">
                {currentWordBank.map((word, idx) => {
                  const isUsed = Object.values(answers).some(val => val.trim().toLowerCase() === word.toLowerCase());
                  return (
                    <span 
                      key={idx} 
                      className={`px-5 py-2.5 font-bold text-lg rounded-2xl border-2 transition-all ${isUsed ? 'bg-white text-slate-300 border-slate-200 shadow-none' : 'bg-white text-emerald-800 border-emerald-300 shadow-sm hover:-translate-y-1'}`}
                    >
                      {word}
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          {/* Question List */}
          <div className="space-y-8 mb-12">
            {currentBatch.map((q, idx) => {
              const userAnswer = (answers[q.id] || "").trim().toLowerCase();
              const correctAnswer = q.answer.trim().toLowerCase();
              const isCorrect = userAnswer === correctAnswer;
              const globalQNum = currentIndex + idx + 1;

              // Determine border colors based on state
              let cardStyle = "bg-white border-2 border-slate-200";
              if (hasChecked) {
                cardStyle = isCorrect ? "bg-green-50 border-4 border-green-400" : "bg-red-50 border-4 border-red-400";
              }

              return (
                <div key={q.id} className={`rounded-3xl p-6 sm:p-10 shadow-lg transition-all duration-300 ${cardStyle}`}>
                  
                  {/* Visual Aid Rendering */}
                  {q.visual && <VisualAid type={q.visual} />}

                  {/* Question Text */}
                  <div className="text-xl sm:text-2xl leading-relaxed text-slate-800 font-bold text-center mt-4 mb-6">
                    <span className="inline-block bg-slate-800 text-white w-10 h-10 rounded-full text-center leading-10 text-xl shadow-md mr-4 align-middle">
                      {globalQNum}
                    </span>
                    
                    {/* Render text with blanks if it's a fill question */}
                    {q.type.includes('fill') ? (
                      <span className="align-middle">
                        {q.text.split('___')[0]}
                        <input 
                          type="text" 
                          className={`blank-input ${hasChecked ? (isCorrect ? 'correct' : 'incorrect') : ''}`}
                          value={answers[q.id] || ""}
                          onChange={(e) => handleInput(q.id, e.target.value)}
                          disabled={hasChecked}
                          spellCheck="false"
                          autoComplete="off"
                          placeholder="type word"
                        />
                        {q.text.split('___')[1]}
                      </span>
                    ) : (
                      <span className="align-middle" dangerouslySetInnerHTML={{ __html: q.text }} />
                    )}
                  </div>

                  {/* MCQ Options Rendering */}
                  {q.type.includes('mcq') && (
                    <div className="flex flex-col gap-4 max-w-2xl mx-auto">
                      {q.options.map((opt, oIdx) => {
                        const isSelected = answers[q.id] === opt;
                        const isOptCorrect = opt.trim().toLowerCase() === correctAnswer;
                        
                        let btnStyle = "bg-white border-2 border-slate-300 text-slate-700 hover:border-purple-500 hover:bg-purple-50";
                        
                        if (hasChecked) {
                          if (isOptCorrect) {
                            btnStyle = "bg-green-500 border-green-600 text-white shadow-md font-black scale-[1.02]";
                          } else if (isSelected && !isOptCorrect) {
                            btnStyle = "bg-red-100 border-red-300 text-red-700 line-through opacity-60";
                          } else {
                            btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-40";
                          }
                        } else if (isSelected) {
                          btnStyle = "bg-purple-600 border-purple-700 text-white font-bold shadow-md scale-[1.02]";
                        }

                        return (
                          <button
                            key={oIdx}
                            disabled={hasChecked}
                            onClick={() => handleInput(q.id, opt)}
                            className={`text-center px-6 py-5 rounded-2xl text-xl sm:text-2xl transition-all duration-200 ${btnStyle}`}
                          >
                            {opt}
                          </button>
                        );
                      })}
                      {/* MCQ Feedback if left blank */}
                      {hasChecked && !isCorrect && !answers[q.id] && (
                        <div className="mt-4 text-red-700 font-bold bg-white px-6 py-4 rounded-2xl shadow-sm border-2 border-red-200 text-center text-xl">
                          ✗ You didn't select an answer!
                        </div>
                      )}
                    </div>
                  )}

                  {/* Fill-in Feedback */}
                  {q.type.includes('fill') && hasChecked && !isCorrect && (
                    <div className="mt-6 text-red-700 font-bold bg-white px-6 py-4 rounded-2xl shadow-sm border-2 border-red-200 text-center text-xl">
                      ✗ The correct word is: <span className="text-white ml-2 px-4 py-1.5 bg-red-600 rounded-xl shadow-inner inline-block uppercase tracking-wider">{q.answer}</span>
                    </div>
                  )}

                </div>
              );
            })}
          </div>

          {/* Action Buttons */}
          <div className="flex justify-center mb-24">
            {!hasChecked ? (
              <button 
                onClick={handleCheck}
                className="px-14 py-6 bg-slate-800 text-white rounded-full shadow-2xl hover:bg-slate-900 transition font-black text-2xl tracking-wide active:scale-95"
              >
                Submit Answers
              </button>
            ) : (
              <button 
                onClick={handleNext}
                className="px-14 py-6 bg-purple-600 text-white rounded-full shadow-2xl hover:bg-purple-700 transition font-black text-2xl flex items-center justify-center gap-4 tracking-wide animate-bounce"
              >
                Next Challenges ➔
              </button>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
